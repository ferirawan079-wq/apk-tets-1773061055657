name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Init Cordova project
        run: |
          cordova create myapp Com.testmob.app "Tets"
          cp config.xml myapp/config.xml
          cp -r www/* myapp/www/

      - name: Add Android platform
        working-directory: myapp
        run: cordova platform add android@12

      - name: Build APK
        working-directory: myapp
        run: cordova build android --release -- --packageType=apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tets-APK
          path: myapp/platforms/android/app/build/outputs/apk/**/*.apk
          retention-days: 7
